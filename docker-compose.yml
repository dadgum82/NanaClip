services:
  nanaclip:
    image: dadgum82/nanaclip:latest
    container_name: nanaclip

    volumes:
      # auth.json must exist in ./config before the first clip run.
      # On Unraid: replace ./config with /mnt/user/appdata/nanaclip
      - ./config:/config

    environment:
      # Harris Teeter coupons page
      - HT_URL=https://www.harristeeter.com/savings/cl/coupons/

      # CSS selector for unclipped coupon buttons.
      # Override here (no rebuild needed) if Harris Teeter updates their DOM.
      - CLIP_SELECTOR=button[data-testid="CouponCard-clip-button"]:not([disabled])

      # Scroll safety cap — 60 iterations covers 300+ coupons comfortably
      - MAX_SCROLL_ITERATIONS=60

      # Jitter range (ms) between individual coupon clips
      - JITTER_MIN=250
      - JITTER_MAX=600

      # Set to "true" to discover and log coupons without actually clicking
      - DRY_RUN=false

      # Leave blank for unlimited clips; set to "1" for a smoke test
      - MAX_CLIPS=

    # CRITICAL for Unraid: container must exit so "docker start nanaclip"
    # works cleanly the following week.  never use "unless-stopped" here.
    restart: "no"

    # Chromium needs at least 256 MB of /dev/shm or it will crash silently.
    # Docker's default is 64 MB — this overrides it.
    shm_size: "256m"

    network_mode: bridge
